# Toolchain versions. Pin concrete values here; bump deliberately per Этап.
kotlinVersion=2.1.0

# Gradle
org.gradle.caching=true
# configuration-cache is OFF on purpose. In a sibling Kotlin pet-project
# (orm-nplus1-radar, Этап 0) configuration-cache produced spurious serialization
# errors for tasks that never actually ran. For a small CLI the speed-up is
# negligible, so we disable it to avoid an entire class of false build failures.
# Re-enable only if a measured need appears and the run is verified green.
org.gradle.configuration-cache=false
kotlin.stdlib.default.dependency=false
